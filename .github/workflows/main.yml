# اسم العملية
name: Deploy static content to Pages

on:
  # التشغيل عند عمل Push لفرع main
  push:
    branches: ["main"]

  # السماح بتشغيل العملية يدوياً من تبويب Actions
  workflow_dispatch:

# إعطاء التصاريح اللازمة للـ Action للرفع على GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# لضمان عدم تشغيل عمليتين في نفس الوقت
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # المسار للمجلد اللي فيه ملف index.html (نقطة تعني المجلد الرئيسي)
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
